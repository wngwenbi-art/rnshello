name: rnshello Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Chaquopy / Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.chaquopy
          key: ${{ runner.os }}-chaquopy-${{ hashFiles('app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-chaquopy-

      # THE FIX: Create an empty settings file so Gradle 9 doesn't look at the main app
      - name: Generate Gradle Wrapper
        run: |
          mkdir temp_wrap
          cd temp_wrap
          touch settings.gradle
          gradle wrapper --gradle-version 8.4
          cd ..
          mv temp_wrap/gradle .
          mv temp_wrap/gradlew .
          mv temp_wrap/gradlew.bat .
          rm -rf temp_wrap

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rnshello-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk